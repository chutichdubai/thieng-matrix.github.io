<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DINO ORIGINAL - P2W EDITION</title>
    <style>
        body { margin: 0; background: #f7f7f7; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Menu P2W */
        #menu { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); color: #0f0; padding: 15px; border: 2px solid #0f0; z-index: 1000; border-radius: 10px; box-shadow: 0 0 15px #0f0; }
        .btn { background: #222; color: #0f0; border: 1px solid #0f0; cursor: pointer; margin: 5px 0; padding: 8px; width: 100%; font-weight: bold; font-family: monospace; }
        .btn:active { background: #0f0; color: #000; }

        /* Màn hình chính */
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Cutscene & Game Over */
        #overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; text-align: center; padding-top: 15vh; }
        .emoji { font-size: 80px; margin: 20px; }
    </style>
</head>
<body>

<div id="menu">
    <div style="text-align: center; border-bottom: 1px solid #0f0; margin-bottom: 10px;">DINO MOD P2W</div>
    <button class="btn" onclick="hackGod()">🔓 BẤT TỬ: <span id="god-label">OFF</span></button>
    <button class="btn" onclick="hackSpeed()">💰 LÊN 10 TỶ ĐIỂM (NTR)</button>
    <button class="btn" onclick="hackFly()">🚀 BAY LÊN TRỜI</button>
</div>

<div id="game-container">
    <iframe id="dino-frame" src="https://chromedino.com/" allow="autoplay"></iframe>
</div>

<div id="overlay">
    <div id="ntr-content">
        <h1>💔 BI KỊCH XUẤT HIỆN...</h1>
        <div class="emoji">🦖 <span style="font-size: 40px;">👩‍❤️‍💋‍👨</span> 🦕</div>
        <p style="font-size: 20px; color: #535353;">Con bồ m đang hôn thằng khủng long khác!</p>
        <p style="color: red; font-weight: bold;">[ ĐANG TIẾN HÀNH TỰ TỬ... ]</p>
    </div>
    
    <div id="suicide-content" style="display:none;">
        <h1 style="color: #535353;">GAME OVER</h1>
        <p>Bạn đã đâm vào xương rồng để giải thoát khỏi nỗi đau.</p>
        <button class="btn" onclick="location.reload()" style="width: 200px; background: #535353; color: white; border: none;">CHƠI LẠI</button>
    </div>
</div>

<script>
    let frame = document.getElementById('dino-frame');
    let godMode = false;

    // 1. Hack Bất Tử
    function hackGod() {
        godMode = !godMode;
        document.getElementById('god-label').innerText = godMode ? "ON" : "OFF";
        document.getElementById('god-label').style.color = godMode ? "red" : "#0f0";
        frame.contentWindow.postMessage('god-mode', '*'); 
        // Lưu ý: Vì iframe bảo mật, t sẽ điều hướng logic giả lập ở dưới
        if(godMode) alert("Đã kích hoạt God Mode - Đi xuyên mọi vật thể!");
    }

    // 2. Hack Tốc độ & Điểm để xem NTR
    function hackSpeed() {
        alert("Đã thanh toán! Nhận 10 tỷ điểm và xem cái kết...");
        startNTR();
    }

    // 3. Hack Bay
    function hackFly() {
        alert("Đang bay vào không gian...");
    }

    function startNTR() {
        document.getElementById('overlay').style.display = 'block';
        
        setTimeout(() => {
            document.getElementById('ntr-content').style.display = 'none';
            document.getElementById('suicide-content').style.display = 'block';
            // Hiệu ứng màn hình rung
            document.body.style.animation = "shake 0.5s";
        }, 4000);
    }
</script>

<style>
    @keyframes shake {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        20% { transform: translate(-3px, 0px) rotate(1deg); }
        40% { transform: translate(3px, 2px) rotate(-1deg); }
        100% { transform: translate(1px, -1px) rotate(0deg); }
    }
</style>

</body>
</html>
