<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SYSTEM BREACHED BY THIENG</title>
    <style>
        body { background: black; color: #0f0; font-family: monospace; overflow: hidden; margin: 0; }
        #text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 1; width: 100%; }
        canvas { position: fixed; top: 0; left: 0; }
        .info { color: #ffff00; font-size: 1.1em; margin-top: 15px; border: 1px solid #0f0; padding: 15px; background: rgba(0,255,0,0.1); display: inline-block; text-align: left; line-height: 1.6; }
        .warning { color: red; font-weight: bold; animation: blink 0.6s infinite; font-size: 1.2em; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="text">
        <h1 style="font-size: 2.5em; color: #0f0;">ACCESS GRANTED</h1>
        <p style="font-size: 1.2em;">Master Thieng is watching you...</p>
        <p class="warning">[ WARNING: SYSTEM OVERLOAD FROM USA ]</p>
        <div id="user-info" class="info">ĐANG TRUY QUÉT MỤC TIÊU...</div>
    </div>
<script>
    var c = document.getElementById("c");
    var ctx = c.getContext("2d");
    c.height = window.innerHeight; c.width = window.innerWidth;
    var matrix = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%";
    matrix = matrix.split("");
    var font_size = 10;
    var columns = c.width/font_size;
    var drops = [];
    for(var x = 0; x < columns; x++) drops[x] = 1; 
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.04)";
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = "#0F0";
        ctx.font = font_size + "px arial";
        for(var i = 0; i < drops.length; i++) {
            var text = matrix[Math.floor(Math.random()*matrix.length)];
            ctx.fillText(text, i*font_size, drops[i]*font_size);
            if(drops[i]*font_size > c.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 35);

    // Vòi lấy địa chỉ siêu ổn định
    fetch('https://ipapi.co/json/')
    .then(res => res.json())
    .then(data => {
        document.getElementById("user-info").innerHTML = `
            <span style="color:red">IP:</span> <span style="color:white">${data.ip}</span> <br>
            <span style="color:red">VỊ TRÍ:</span> <span style="color:white">${data.city}, ${data.region}</span> <br>
            <span style="color:red">NHÀ MẠNG:</span> <span style="color:white">${data.org}</span> <br>
            <span style="color:white; background:red; padding: 2px 5px; font-weight:bold;">TRẠNG THÁI: ĐÃ KHOÁ MỤC TIÊU</span>
        `;
    })
    .catch(() => {
        document.getElementById("user-info").innerHTML = "ĐANG VƯỢT TƯỜNG LỬA...";
    });
</script>
</body>
</html>
