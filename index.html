<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DINO ORIGINAL HACKER</title>
    <style>
        body { margin: 0; background: #f7f7f7; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        /* Menu Mod */
        #mod-menu {
            position: fixed; top: 10px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.9); color: #0f0; padding: 10px;
            border: 2px solid #0f0; border-radius: 5px; width: 150px;
        }
        .btn {
            background: #222; color: #0f0; border: 1px solid #0f0;
            width: 100%; margin: 3px 0; padding: 5px; cursor: pointer; font-size: 11px;
        }
        canvas { display: block; margin: 0 auto; background: #fff; }
        
        /* Cảnh bi kịch */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; text-align: center; padding-top: 15vh;
        }
    </style>
</head>
<body>

<div id="mod-menu">
    <div style="font-size: 12px; text-align: center; margin-bottom: 5px;">THIENG MOD V4</div>
    <button class="btn" onclick="toggleGod()">🔓 GOD MODE: <span id="g-st">OFF</span></button>
    <button class="btn" onclick="startNTR()">💰 PAY 2 WIN (NTR)</button>
</div>

<div id="overlay">
    <div style="font-size: 60px;">🦖 💔 🦕</div>
    <h2 style="color: black;">BI KỊCH: NÓ CÓ THẰNG KHÁC RỒI!</h2>
    <p id="death-msg" style="color: red; font-weight: bold;"></p>
</div>

<div id="game-area"></div>

<script src="https://cdn.jsdelivr.net/gh/wayou/t-rex-runner/dist/bundle.js"></script>

<script>
    let isGod = false;

    // Chờ game load xong rồi can thiệp
    window.onload = () => {
        // Tích hợp game vào game-area
        new Runner('#game-area');
    };

    function toggleGod() {
        isGod = !isGod;
        document.getElementById('g-st').innerText = isGod ? "ON" : "OFF";
        document.getElementById('g-st').style.color = isGod ? "red" : "#0f0";
        
        // Lệnh hack bất tử chính thức của Google
        if (isGod) {
            Runner.instance_.gameOver = function(){};
        } else {
            location.reload(); // Reset để tắt bất tử
        }
    }

    function startNTR() {
        // Lên điểm siêu cao
        Runner.instance_.distanceRan = 999999999;
        
        // Hiện cảnh bi kịch
        document.getElementById('overlay').style.display = 'block';
        let msg = document.getElementById('death-msg');
        
        setTimeout(() => {
            msg.innerText = "ĐANG LAO VÀO XƯƠNG RỒNG TỰ TỬ...";
            setTimeout(() => {
                msg.innerText = "KẾT THÚC NỖI ĐAU!";
                setTimeout(() => { location.reload(); }, 2000);
            }, 2000);
        }, 2000);
    }
</script>
</body>
</html>
